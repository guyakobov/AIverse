<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIverse - The Best AI Tools Directory</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0f172a;
      /* Slate 900 */
      color: #f8fafc;
      /* Slate 50 */
    }

    /* Global Focus Styles */
    :focus-visible {
      outline: 2px solid #7c3aed;
      /* Violet 600 */
      outline-offset: 2px;
    }

    /* Skip to Content Link */
    .skip-link {
      position: absolute;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      background: #7c3aed;
      color: white;
      padding: 12px 24px;
      z-index: 1000;
      border-radius: 0 0 12px 12px;
      font-weight: bold;
      transition: top 0.2s;
    }

    .skip-link:focus {
      top: 0;
    }

    /* Accessibility: Respect Reduced Motion */
    @media (prefers-reduced-motion: reduce) {

      *,
      ::before,
      ::after {
        animation-delay: -1ms !important;
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        background-attachment: initial !important;
        scroll-behavior: auto !important;
        transition-duration: 0s !important;
        transition-delay: 0s !important;
      }
    }

    /* Custom scrollbar for webkit */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #1e293b;
    }

    ::-webkit-scrollbar-thumb {
      background: #475569;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #64748b;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fade-in {
      animation: fadeIn 0.5s ease-out forwards;
    }

    /* Accessibility Overrides */
    html.accessibility-monochrome {
      filter: grayscale(100%) !important;
    }

    html.accessibility-high-contrast body,
    html.accessibility-high-contrast {
      background-color: #000 !important;
      color: #0f0 !important;
    }

    html.accessibility-high-contrast * {
      background-color: #000 !important;
      color: #0f0 !important;
      border-color: #0f0 !important;
    }

    html.accessibility-text-zoom {
      font-size: calc(16px * var(--a11y-zoom, 1)) !important;
    }

    html.accessibility-screen-reader *:focus {
      outline: 4px solid #facc15 !important;
      /* High visibility yellow */
      outline-offset: 4px !important;
      transition: outline 0.1s;
    }
  </style>

</head>

</html>
